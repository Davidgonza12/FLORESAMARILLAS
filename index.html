<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo Elegante</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0f2027, #000);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    overflow: hidden;
}

/* CONTENEDOR */
.ramo {
    position: relative;
    width: 350px;
    height: 400px;
}

/* TALLO */
.tallo {
    position: absolute;
    bottom: 0;
    width: 4px;
    background: linear-gradient(#1f7a4c, #0b3d2e);
    left: 50%;
    transform: translateX(-50%);
    height: var(--h);
}

/* FLOR */
.flor {
    position: absolute;
    left: 50%;
    transform: translate(-50%, 0);
    bottom: var(--h);
    width: var(--size);
    height: var(--size);
}

/* CENTRO */
.flor::before {
    content: "";
    position: absolute;
    width: 30%;
    height: 30%;
    background: gold;
    border-radius: 50%;
    top: 35%;
    left: 35%;
    box-shadow: 0 0 10px gold;
}

/* PÉTALOS */
.petalo {
    position: absolute;
    width: 50%;
    height: 50%;
    background: linear-gradient(yellow, #ffcc00);
    border-radius: 50%;
}

.p1 { top: 0; left: 25%; }
.p2 { top: 25%; right: 0; }
.p3 { bottom: 0; left: 25%; }
.p4 { top: 25%; left: 0; }

/* HOJAS */
.hoja {
    position: absolute;
    bottom: 0;
    width: 60px;
    height: 20px;
    background: linear-gradient(#1f7a4c, #0b3d2e);
    border-radius: 50%;
    transform-origin: left;
}

/* PARTÍCULAS */
.particula {
    position: absolute;
    width: 3px;
    height: 3px;
    background: gold;
    border-radius: 50%;
    animation: flotar 4s infinite;
}

@keyframes flotar {
    0% { transform: translateY(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-80px); opacity: 0; }
}
</style>
</head>

<body>

<div class="ramo" id="ramo"></div>

<script>
function crearFlor(x, altura, size) {
    const cont = document.createElement("div");
    cont.style.position = "absolute";
    cont.style.left = x + "px";
    cont.style.bottom = "0";

    // TALLO
    const tallo = document.createElement("div");
    tallo.className = "tallo";
    tallo.style.setProperty('--h', altura + "px");

    // FLOR
    const flor = document.createElement("div");
    flor.className = "flor";
    flor.style.setProperty('--size', size + "px");
    flor.style.setProperty('--h', altura + "px");

    for (let i = 1; i <= 4; i++) {
        const p = document.createElement("div");
        p.className = "petalo p" + i;
        flor.appendChild(p);
    }

    // HOJAS
    const hoja1 = document.createElement("div");
    hoja1.className = "hoja";
    hoja1.style.left = "-50px";
    hoja1.style.transform = "rotate(-30deg)";

    const hoja2 = document.createElement("div");
    hoja2.className = "hoja";
    hoja2.style.left = "10px";
    hoja2.style.transform = "rotate(30deg)";

    cont.appendChild(tallo);
    cont.appendChild(flor);
    cont.appendChild(hoja1);
    cont.appendChild(hoja2);

    document.getElementById("ramo").appendChild(cont);

    // PARTÍCULAS
    for (let i = 0; i < 5; i++) {
        const p = document.createElement("div");
        p.className = "particula";
        p.style.left = (x + Math.random()*30) + "px";
        p.style.bottom = (altura) + "px";
        p.style.animationDelay = Math.random()*4 + "s";
        document.body.appendChild(p);
    }
}

/* RAMO CENTRADO */
crearFlor(175, 220, 70);
crearFlor(140, 200, 60);
crearFlor(210, 200, 60);
crearFlor(110, 180, 50);
crearFlor(240, 180, 50);
</script>

</body>
</html>
